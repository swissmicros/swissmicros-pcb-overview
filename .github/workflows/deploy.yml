name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Jekyll
        run: bundle exec jekyll build

      - name: Install StaticCrypt
        run: npm install -g staticrypt

      - name: Encrypt site
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          find _site -name "*.html" | while IFS= read -r file; do
            dir=$(dirname "$file")
            staticrypt "$file" \
              --password "$STATICRYPT_PASSWORD" \
              --directory "$dir" \
              --remember 7 \
              --template-title "SwissMicros PCB Docs" \
              --template-instructions "Enter the SwissMicros PCB access password to continue."
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
