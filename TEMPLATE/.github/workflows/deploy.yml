name: Build and Deploy PCB Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Copy project outputs into docs/assets/ ──────────────────────
      - name: Stage project outputs
        run: |
          mkdir -p docs/assets/downloads docs/assets/images

          # Board image (PNG in repo root)
          cp calcbase*.png docs/assets/images/ 2>/dev/null || true

          # Find latest dated output directory
          LATEST=$(ls -d Project_Outputs/calcbase*_[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9] 2>/dev/null | sort | tail -1)

          if [ -n "$LATEST" ]; then
            echo "Staging from: $LATEST"

            # Schematics + 3D PDFs (root of output dir)
            find "$LATEST" -maxdepth 1 \( -iname "*.pdf" \) -exec cp -v {} docs/assets/downloads/ \;

            # BOM
            [ -d "$LATEST/BOM" ] && \
              find "$LATEST/BOM" -name "*.xlsx" -exec cp -v {} docs/assets/downloads/ \; || true

            # Gerber → zip
            [ -d "$LATEST/Gerber" ] && \
              zip -rj docs/assets/downloads/gerber.zip "$LATEST/Gerber/" || true

            # NC Drill → zip
            [ -d "$LATEST/NC Drill" ] && \
              zip -rj docs/assets/downloads/nc_drill.zip "$LATEST/NC Drill/" || true

            # ODB++ → zip
            [ -d "$LATEST/ODB" ] && \
              zip -rj docs/assets/downloads/odb.zip "$LATEST/ODB/" || true

            # Pick & Place (keep files as-is)
            [ -d "$LATEST/Pick Place" ] && \
              cp -v "$LATEST/Pick Place/"* docs/assets/downloads/ 2>/dev/null || true

            # Board stack report
            [ -d "$LATEST/Report Board Stack" ] && \
              find "$LATEST/Report Board Stack" -type f -exec cp -v {} docs/assets/downloads/ \; || true
          else
            echo "No dated output directory found in Project_Outputs/ — skipping file copy."
          fi

      # ── Build ────────────────────────────────────────────────────────
      - name: Build Jekyll
        run: bundle exec jekyll build --source docs --destination _site

      # ── Encrypt ─────────────────────────────────────────────────────
      - name: Install StaticCrypt
        run: npm install -g staticrypt

      - name: Encrypt HTML pages
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          find _site -name "*.html" | while IFS= read -r file; do
            dir=$(dirname "$file")
            staticrypt "$file" \
              --password "$STATICRYPT_PASSWORD" \
              --directory "$dir" \
              --remember 7 \
              --template-title "SwissMicros PCB Documentation" \
              --template-instructions "Enter the SwissMicros PCB access password to continue."
          done

      # ── Deploy ───────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
