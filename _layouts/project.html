<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.project_name }} | SwissMicros PCB</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="header-back" href="{{ site.overview_url }}">&#8592; All Projects</a>
      <span class="header-divider">|</span>
      <span class="project-title">{{ site.project_name }}</span>
      {% if site.project_version %}
      <span class="project-version">{{ site.project_version }}</span>
      {% endif %}
    </div>
  </header>

  <div class="page-wrapper">
    <nav class="sidebar">
      {% include project-nav.html %}
    </nav>

    <main class="main-content">
      <h1 class="page-heading">{{ page.title }}</h1>
      {{ content }}
    </main>
  </div>

  {% include footer.html %}
</body>
</html>
